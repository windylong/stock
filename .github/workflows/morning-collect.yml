name: 아침 뉴스 수집 (08:00 KST)

on:
  schedule:
    # 08:00 KST = 23:00 UTC (전날)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      slot:
        description: '수집 슬롯'
        required: false
        default: 'morning'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 아침 뉴스 수집 및 AI 분석 실행
        run: |
          curl -f -X POST "${{ secrets.APP_URL }}/api/collect" \
            -H "Content-Type: application/json" \
            -H "x-collect-secret: ${{ secrets.COLLECT_SECRET }}" \
            -d '{"slot":"morning"}' \
            --max-time 600 \
            -w "\n응답 코드: %{http_code}\n"

      - name: 결과 확인
        if: failure()
        run: echo "아침 수집 실패. APP_URL과 COLLECT_SECRET 시크릿을 확인하세요."
