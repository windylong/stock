name: 종가 분석 (16:10 KST)

on:
  schedule:
    # 16:10 KST = 07:10 UTC
    - cron: '10 7 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 종가 분석 실행 (예측 vs 실제 비교)
        run: |
          curl -f -X POST "${{ secrets.APP_URL }}/api/collect" \
            -H "Content-Type: application/json" \
            -H "x-collect-secret: ${{ secrets.COLLECT_SECRET }}" \
            -d '{"slot":"closing"}' \
            --max-time 900 \
            -w "\n응답 코드: %{http_code}\n"
